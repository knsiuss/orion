services:
  edith:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edith
    restart: unless-stopped
    volumes:
      - ./prisma:/app/prisma          # SQLite database persistence
      - ./.edith:/app/.edith          # backups + outbox.json
      - ./.env:/app/.env:ro           # secrets (read-only mount)
      - ./workspace:/app/workspace    # SOUL.md, USER.md, AGENTS.md
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/edith.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
