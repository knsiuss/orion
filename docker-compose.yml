version: "3.9"
services:
  edith:
    build: .
    ports:
      - "18789:18789"
      - "8080:8080"
    volumes:
      - edith_data:/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/edith.db

volumes:
  edith_data:
